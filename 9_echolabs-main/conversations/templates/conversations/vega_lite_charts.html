{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Vega-Lite Charts</h2>
    <p class="meta">Bar chart: conversations by user. Scatter: duration by date.</p>
    <div id="chart1"></div>
    <div id="chart2"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
<script>
(function() {
    var base = window.location.origin;
    vegaEmbed('#chart1', {
        "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
        "data": { "url": base + "{% url 'api_summary' %}" },
        "mark": "bar",
        "encoding": {
            "x": { "field": "username", "type": "nominal", "title": "User" },
            "y": { "field": "count", "type": "quantitative", "title": "Count" }
        },
        "title": "Conversations by User"
    });
    vegaEmbed('#chart2', {
        "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
        "data": { "url": base + "{% url 'conversations_api_json' %}" },
        "mark": "point",
        "encoding": {
            "x": { "field": "recorded_at", "type": "temporal", "title": "Recorded" },
            "y": { "field": "duration_seconds", "type": "quantitative", "title": "Duration (s)" }
        },
        "title": "Duration by Recorded Date"
    });
})();
</script>
{% endblock %}
