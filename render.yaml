services:
  - type: web
    name: echolabs
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn echolabs_project.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: echolabs_project.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: HF_TOKEN
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: echolabs-db
          property: connectionString

databases:
  - name: echolabs-db
    plan: free
